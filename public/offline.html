<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELUZA — Sem conexão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      background: #091D1E;
      color: #F6F1ED;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .brand {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .brand-sub {
      font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #8C857B;
      margin-bottom: 48px;
    }
    .icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 24px;
      color: #F6F1ED;
    }
    h1 {
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 13px;
      color: #8C857B;
      line-height: 1.7;
      max-width: 280px;
      margin: 0 auto 32px;
    }
    button {
      background: #F6F1ED;
      color: #091D1E;
      border: 1px solid #F6F1ED;
      font-family: 'Instrument Sans', -apple-system, sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 14px 28px;
      border-radius: 2px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="brand">ELUZA</div>
  <div class="brand-sub">Private Travel Design Studio</div>
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="currentColor">
    <rect x="5" y="5" width="38" height="38" stroke-width="1"/>
    <path d="M31 15H17v18h14M17 24h11" stroke-width="1.5"/>
  </svg>
  <h1>Você está offline</h1>
  <p>Verifique sua conexão com a internet e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
</body>
</html>
